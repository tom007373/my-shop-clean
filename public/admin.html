<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Admin - Zamówienia</title>

<style>
body{
  font-family:Arial;
  background:#111;
  color:#fff;
  padding:20px;
}

.order{
  background:#1a1a1a;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

.paid{ color:lime; }
.pending{ color:orange; }

pre{
  background:#000;
  padding:10px;
  border-radius:8px;
  overflow:auto;
}
</style>
</head>

<body>

<h1>Zamówienia</h1>

<div id="orders"></div>

<script>

let ADMIN_TOKEN = localStorage.getItem("admin_token");

async function login(){
  const input = prompt("Podaj hasło admina:");
  if(!input) return;

  ADMIN_TOKEN = input;
  localStorage.setItem("admin_token", input);

  loadOrders();
}

async function loadOrders(){

  if(!ADMIN_TOKEN){
    return login();
  }

  const res = await fetch("/admin/orders", {
    headers: {
      "x-admin-token": ADMIN_TOKEN
    }
  });

  if(res.status === 401){
    alert("Złe hasło!");
    localStorage.removeItem("admin_token");
    return login();
  }

  const orders = await res.json();

  const container = document.getElementById("orders");
  container.innerHTML = "";

  orders.forEach(order => {

    const address = order.address || {};

    container.innerHTML += `
      <div class="order">

        <h3>ID: ${order.id}</h3>

        <p>
          <strong>Status:</strong> 
          <span class="${order.status}">
            ${order.status}
          </span>
        </p>

        <p><strong>Email:</strong> ${order.email}</p>
        <p><strong>Telefon:</strong> ${order.phone}</p>

        <p><strong>Adres:</strong><br>
          ${address.street || ""}<br>
          ${address.city || ""} ${address.zip || ""}<br>
          ${address.country || ""}
        </p>

        <p><strong>Suma:</strong> ${order.total || 0} zł</p>

        <p><strong>Data:</strong> 
          ${new Date(order.created_at).toLocaleString()}
        </p>

       <h4>Produkty:</h4>
<div>
  ${order.cart.map(item => {

    const logo = item.options?.logo;

    return `
      <div style="margin-bottom:10px;">
        <strong>${item.name}</strong><br>
        Ilość: ${item.quantity}<br>

        ${logo ? `
          <a href="/uploads/${logo}" target="_blank">
            🔗 Pobierz logo
          </a>
        ` : ""}

        <hr>
      </div>
    `;
  }).join("")}
</div>
      </div>
    `;
  });
}

loadOrders();

</script>
</body>
</html>
