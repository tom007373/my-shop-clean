<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Admin - Zamówienia</title>

<style>
body{
  font-family:Arial;
  background:#111;
  color:#fff;
  padding:20px;
}

.order{
  background:#1a1a1a;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

.paid{ color:lime; }
.pending{ color:orange; }

pre{
  background:#000;
  padding:10px;
  border-radius:8px;
  overflow:auto;
}
</style>
</head>

<body>

<h1>Zamówienia</h1>

<div id="orders"></div>

<script>
async function loadOrders(){

  const res = await fetch("/admin/orders");
  const orders = await res.json();

  const container = document.getElementById("orders");
  container.innerHTML = "";

  orders.forEach(order => {

    container.innerHTML += `
      <div class="order">

        <h3>ID: ${order.id}</h3>

        <p>
          <strong>Status:</strong> 
          <span class="${order.status}">
            ${order.status}
          </span>
        </p>

        <p><strong>Email:</strong> ${order.email}</p>
        <p><strong>Telefon:</strong> ${order.phone}</p>

        <p><strong>Suma:</strong> ${order.total || 0} zł</p>

        <p><strong>Data:</strong> ${new Date(order.created_at).toLocaleString()}</p>

        <h4>Produkty:</h4>
        <pre>${JSON.stringify(order.cart, null, 2)}</pre>

      </div>
    `;
  });
}

loadOrders();
</script>

</body>
</html>
